# Grafana configuration overrides for mcow.
# Mounted read-only at /etc/grafana/grafana.ini via docker-compose.monitoring.yml.
#
# Phase 04-02: pin Operator Overview as the default home dashboard.
# Provisioned JSON lives at /etc/grafana/provisioning/dashboards/json/homelab-overview.json
# inside the container (mounted from ./monitoring/grafana/provisioning on the host).

[auth.anonymous]
enabled = true
org_role = Admin

[users]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/json/homelab-overview.json
