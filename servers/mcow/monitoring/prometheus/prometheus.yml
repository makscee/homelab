global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['100.101.0.9:9093']   # Alertmanager on mcow (moved 2026-04-15; was localhost:9093)

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:

  # Prometheus self-scrape
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Alertmanager scrape (moved to mcow 2026-04-15; satisfies AlertmanagerDown rule)
  # Container publishes 100.101.0.9:9093 (Tailscale iface only) — Prometheus runs
  # in a container so localhost:9093 is unreachable. Use mcow's tailscale IP.
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['100.101.0.9:9093']

  # Node exporters on all 6 Tailnet hosts
  - job_name: 'node'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/nodes.yml
        refresh_interval: 5m

  # cAdvisor — container metrics (docker-tower + mcow)
  - job_name: 'cadvisor'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/cadvisor.yml
        refresh_interval: 5m

  # Claude Code usage exporter on mcow
  # Container publishes 100.101.0.9:9101 (Tailscale iface only) — Prometheus runs
  # in a container so localhost:9101 is unreachable. Use mcow's tailscale IP.
  - job_name: 'claude-usage'
    scrape_interval: 60s
    static_configs:
      - targets: ['100.101.0.9:9101']

  # void-keys metrics exporter on mcow (HMB-21)
  - job_name: 'void-keys'
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:3000']

  # homelab-admin self-monitoring (D-22-17, plan 22-06)
  # Scrapes /api/health over HTTPS. Endpoint returns JSON (not Prometheus text
  # format); fallback_scrape_protocol keeps `up` metric populated without a
  # parse error. Any non-2xx → up=0 → HomelabAdminDown alert.
  - job_name: 'homelab-admin'
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: '/api/health'
    scheme: 'https'
    fallback_scrape_protocol: 'PrometheusText0.0.4'
    static_configs:
      - targets: ['homelab.makscee.ru']
        labels:
          service: 'homelab-admin'
          host: 'mcow'
