# Source: /opt/homestack/docker-compose.monitoring.yml on docker-tower
#
# 2026-04-15: Grafana + Alertmanager DECOMMISSIONED (migrated to mcow).
#   - Grafana:      http://100.101.0.9:3000
#   - Alertmanager: http://100.101.0.9:9093
#   - See servers/mcow/docker-compose.monitoring.yml
#   - Volumes `monitoring_grafana-data` and `monitoring_alertmanager-data` preserved
#     until 2026-04-22 for rollback. After that date: docker volume rm the two volumes.
#
# This stack now runs only: prometheus + cadvisor.
# /run/secrets/ no longer consumed here (telegram_token lives on mcow).

services:

  # ── Prometheus — Metrics Collection ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus@sha256:1f0f50f06acaceb0f5670d2c8a658a599affe7b0d8e78b898c1035653849a702  # prom/prometheus:latest, pinned 2026-04-14
    container_name: prometheus
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=720h'
      - '--web.enable-lifecycle'

  # ── Grafana — DECOMMISSIONED 2026-04-15 ─────────────────────────────────────
  # Migrated to mcow (100.101.0.9:3000). See servers/mcow/docker-compose.monitoring.yml.
  # Volume `monitoring_grafana-data` preserved for 1 week rollback window.
  # If rollback needed within that window: uncomment + `docker compose up -d grafana`.
  # After 2026-04-22: remove this block and run `docker volume rm monitoring_grafana-data`.
  # grafana:
  #   image: grafana/grafana@sha256:2175aaa91c96733d86d31cf270d5310b278654b03f5718c59de12a865380a31f
  #   container_name: grafana
  #   restart: unless-stopped
  #   ports:
  #     - "100.101.0.8:3000:3000"
  #   env_file:
  #     - path: /run/secrets/grafana.env
  #       required: false
  #   environment:
  #     - GF_USERS_ALLOW_SIGN_UP=false
  #     - GF_SERVER_ROOT_URL=http://100.101.0.8:3000
  #     - GF_INSTALL_PLUGINS=grafana-piechart-panel
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #     - ./grafana/provisioning:/etc/grafana/provisioning:ro
  #   networks:
  #     - monitoring
  #   depends_on:
  #     - prometheus

  # ── Alertmanager — DECOMMISSIONED 2026-04-15 ────────────────────────────────
  # Migrated to mcow (100.101.0.9:9093). See servers/mcow/docker-compose.monitoring.yml.
  # Volume `monitoring_alertmanager-data` preserved for 1 week rollback window.
  # If rollback needed within that window: uncomment + `docker compose up -d alertmanager`
  # and flip Prometheus alerting target back to localhost:9093 (see prometheus/prometheus.yml).
  # After 2026-04-22: remove this block and run `docker volume rm monitoring_alertmanager-data`.
  # alertmanager:
  #   image: prom/alertmanager@sha256:e13b6ed5cb929eeaee733479dce55e10eb3bc2e9c4586c705a4e8da41e5eacf5
  #   container_name: alertmanager
  #   restart: unless-stopped
  #   network_mode: host
  #   volumes:
  #     - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
  #     - /run/secrets/telegram_token:/etc/alertmanager/telegram_token:ro
  #     - alertmanager-data:/alertmanager
  #   command:
  #     - '--config.file=/etc/alertmanager/alertmanager.yml'
  #     - '--storage.path=/alertmanager'

  # ── cAdvisor — Container Metrics ─────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor@sha256:3de2bd5203120b866d74a9b283b2ffb8ec382fbf9dc321814700c6ea6f44ec57  # cadvisor:latest, upgraded for Docker API 1.44+
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "100.101.0.8:8080:8080"
    command:
      - '--docker_only=true'
      - '--store_container_labels=true'
      - '--housekeeping_interval=30s'
    networks:
      - monitoring

networks:
  monitoring:
    external: true

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
