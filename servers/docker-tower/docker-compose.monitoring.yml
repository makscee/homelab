# Source: /opt/homestack/docker-compose.monitoring.yml on docker-tower
#
# Secrets: before `docker compose up`, decrypt the SOPS-encrypted env file AND install the bot token:
#   mkdir -p /run/secrets
#   sops --decrypt --output-type dotenv ../../secrets/docker-tower.sops.yaml > /run/secrets/docker-tower.env
#   chmod 600 /run/secrets/docker-tower.env
#   source /run/secrets/docker-tower.env
#   install -m 600 -o root -g root /dev/stdin /run/secrets/grafana.env <<EOF
#   GF_SECURITY_ADMIN_USER=$GF_SECURITY_ADMIN_USER
#   GF_SECURITY_ADMIN_PASSWORD=$GF_SECURITY_ADMIN_PASSWORD
#   EOF
#   install -m 600 -o root -g root /dev/stdin /run/secrets/telegram_token <<<"$TELEGRAM_BOT_TOKEN"
#
# /run/secrets/ is gitignored — never commit the decrypted output.
# See monitoring/alertmanager/README.md for full alertmanager deploy notes.

services:

  # ── Prometheus — Metrics Collection ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus@sha256:1f0f50f06acaceb0f5670d2c8a658a599affe7b0d8e78b898c1035653849a702  # prom/prometheus:latest, pinned 2026-04-14
    container_name: prometheus
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=720h'
      - '--web.enable-lifecycle'

  # ── Grafana — Visualization Dashboard ────────────────────────────────────────
  grafana:
    image: grafana/grafana@sha256:2175aaa91c96733d86d31cf270d5310b278654b03f5718c59de12a865380a31f  # grafana/grafana:latest, pinned 2026-04-14
    container_name: grafana
    restart: unless-stopped
    ports:
      - "100.101.0.8:3000:3000"
    env_file:
      - path: /run/secrets/grafana.env  # decrypt from secrets/docker-tower.sops.yaml — see header comment
        required: false                  # allows `docker compose config` to validate without the decrypted file
    environment:
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://100.101.0.8:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring
    depends_on:
      - prometheus

  # ── Alertmanager — Alert Routing (Telegram) ───────────────────────────────────
  alertmanager:
    image: prom/alertmanager@sha256:e13b6ed5cb929eeaee733479dce55e10eb3bc2e9c4586c705a4e8da41e5eacf5  # prom/alertmanager:v0.27.0, pinned 2026-04-14
    container_name: alertmanager
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - /run/secrets/telegram_token:/etc/alertmanager/telegram_token:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'

  # ── cAdvisor — Container Metrics ─────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor@sha256:3cde6faf0791ebf7b41d6f8ae7145466fed712ea6f252c935294d2608b1af388  # cadvisor:v0.49.1, pinned 2026-04-14
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "100.101.0.8:8080:8080"
    networks:
      - monitoring

networks:
  monitoring:
    external: true

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
