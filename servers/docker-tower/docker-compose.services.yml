# Note: Tower API is now running as a host service (systemd), not as a container.
# API is available on port 8000 on the host machine.
# Source: /opt/homestack/services/tower/docker-compose.yml

services:
  jellyfin:
    image: jellyfin/jellyfin@sha256:6d819e9ab067efcf712993b23455cc100ee5585919bb297ea5a109ac00cb626e  # was latest, pinned 2026-04-14
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
    volumes:
      - /media:/media:ro
      - /opt/docker-configs/shared/jellyfin:/config
      - /tmp:/tmp/cache
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
    networks:
      - media

  filebrowser:
    image: filebrowser/filebrowser@sha256:a22a0e9cddfd9a83e10a0d53453fb412e152693257065299a78481a75a8c90ce  # was latest, pinned 2026-04-14
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - /media:/srv
      - /opt/docker-configs/shared/filebrowser:/config
    environment:
      - PUID=1000
      - PGID=1000
    networks:
      - media

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.0.3  # pinned 2026-04-14 (container not live at snapshot; tag set to last-known stable)
    container_name: qbittorrent
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - /media:/media
      - /opt/docker-configs/shared/qbittorrent:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - WEBUI_PORT=8080
    networks:
      - media

  prowlarr:
    network_mode: host
    image: lscr.io/linuxserver/prowlarr@sha256:67a8aaedcfd6989f3030b937a6a07007310b1dfc7ee8df16d2cbfa48d1c1158c  # was latest, pinned 2026-04-14
    container_name: prowlarr
    restart: unless-stopped
    volumes:
      - /opt/docker-configs/shared/prowlarr:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow

  sonarr:
    image: lscr.io/linuxserver/sonarr@sha256:8b9f2138ec50fc9e521960868f79d2ad0d529bc610aef19031ea8ff80b54c5e0  # was latest, pinned 2026-04-14
    container_name: sonarr
    restart: unless-stopped
    ports:
      - "8989:8989"
    volumes:
      - /media:/media
      - /opt/docker-configs/shared/sonarr:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
    networks:
      - media

  radarr:
    image: lscr.io/linuxserver/radarr@sha256:6c0948b42c149e36bb3dbc0b64d36c77b2d3c9dccf1b424c4f72af1e57ba0c21  # was latest, pinned 2026-04-14
    container_name: radarr
    restart: unless-stopped
    ports:
      - "7878:7878"
    volumes:
      - /media:/media
      - /opt/docker-configs/shared/radarr:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
    networks:
      - media

  lidarr:
    image: lscr.io/linuxserver/lidarr@sha256:0922867151c5175f394f4d865f6b3e63e8c05141132188e8790a1e66358e7196  # was latest, pinned 2026-04-14
    container_name: lidarr
    restart: unless-stopped
    ports:
      - "8686:8686"
    volumes:
      - /media:/media
      - /opt/docker-configs/shared/lidarr:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
    networks:
      - media

  flaresolverr:
    image: flaresolverr/flaresolverr@sha256:7962759d99d7e125e108e0f5e7f3cdbcd36161776d058d1d9b7153b92ef1af9e  # was latest, pinned 2026-04-14
    container_name: flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=info
      - TZ=Europe/Moscow
    networks:
      - media

  docker-proxy:
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476  # was latest, pinned 2026-04-14
    container_name: dockerproxy
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "2375:2375"
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - INFO=1
      - POST=1
      - BUILD=0
      - SECRETS=0
      - PRIVILEGED=0
    restart: unless-stopped
    networks:
      - media
      - homestack

  personal-page:
    image: nginx:alpine
    container_name: personal-page
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./personal-page:/usr/share/nginx/html:ro
    networks:
      - homestack

networks:
  media:
    driver: bridge

  homestack:
    driver: bridge
    external: true
