groups:
  - name: homelab.nodes
    interval: 1m
    rules:

      # --- Host reachability ---
      - alert: HostDown
        expr: up{job="node"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host {{ $labels.instance }} is down"
          description: "node-exporter on {{ $labels.instance }} has been unreachable for 5 minutes."
          runbook: "servers/{{ $labels.instance }}/inventory.md"

      # --- Disk ---
      - alert: DiskUsageCritical
        expr: |
          (
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}
            - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
          ) / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"} > 0.98
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk >98% on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Disk {{ $labels.mountpoint }} is {{ $value | humanizePercentage }} full."

      # --- Memory ---
      - alert: MemoryPressure
        expr: |
          node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low memory on {{ $labels.instance }}"
          description: "Available memory below 10% for 10m."

  - name: homelab.containers
    interval: 1m
    rules:

      # --- Container restart loop ---
      - alert: ContainerRestartLoop
        expr: |
          changes(container_start_time_seconds{container!="",container!="cadvisor"}[15m]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} restarting on {{ $labels.instance }}"
          description: "Container {{ $labels.name }} has restarted {{ $value }} times in 15 minutes."

      # --- cAdvisor self-availability ---
      - alert: CAdvisorDown
        expr: up{job="cadvisor"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cAdvisor down on {{ $labels.instance }}"

  - name: homelab.prometheus
    interval: 1m
    rules:

      # --- Prometheus self-scrape meta-alert ---
      - alert: PrometheusSelfScrapeFailure
        expr: up{job="prometheus"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus cannot scrape itself"
          description: "Prometheus self-scrape has been failing for 2 minutes — monitoring is broken."

      # --- Alertmanager connectivity ---
      - alert: AlertmanagerDown
        expr: |
          absent(up{job="alertmanager"}) or up{job="alertmanager"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Alertmanager is unreachable from Prometheus"

  - name: homelab.claude
    interval: 1m
    rules:

      # --- 5h usage high ---
      - alert: ClaudeUsage5hHigh
        expr: claude_usage_5h_utilization > 0.8
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Claude 5h usage {{ $value | humanizePercentage }} for {{ $labels.name }}"
          description: "Token {{ $labels.name }} 5-hour utilization above 80% for 15 minutes."

      - alert: ClaudeUsage5hCritical
        expr: claude_usage_5h_utilization > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Claude 5h usage {{ $value | humanizePercentage }} for {{ $labels.name }}"
          description: "Token {{ $labels.name }} 5-hour utilization above 95% — effectively rate-limited."

      # --- 7d usage high ---
      - alert: ClaudeUsage7dHigh
        expr: claude_usage_7d_utilization > 0.8
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Claude 7d usage {{ $value | humanizePercentage }} for {{ $labels.name }}"
          description: "Token {{ $labels.name }} 7-day utilization above 80% for 15 minutes."

      - alert: ClaudeUsage7dCritical
        expr: claude_usage_7d_utilization > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Claude 7d usage {{ $value | humanizePercentage }} for {{ $labels.name }}"
          description: "Token {{ $labels.name }} 7-day utilization above 95% — effectively rate-limited."

      # --- Exporter health ---
      - alert: ClaudeExporterDown
        expr: up{job="claude-usage"} == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Claude usage exporter unreachable"
          description: "Prometheus cannot scrape mcow:9101 for 10 minutes."

