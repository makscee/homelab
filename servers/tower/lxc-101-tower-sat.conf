# Source: /etc/pve/lxc/101.conf on tower (Proxmox)
# LXC 101 = tower-sat

arch: amd64
cores: 2
features: nesting=1,keyctl=1
hostname: tower-sat
memory: 2048
nameserver: 1.1.1.1
net0: name=eth0,bridge=vmbr1,gw=10.10.20.1,hwaddr=BC:24:11:1F:9C:36,ip=10.10.20.101/24,ip6=auto,type=veth
onboot: 1
ostype: debian
rootfs: toshi:101/vm-101-disk-0.raw,size=40G
swap: 512
tags: community-script;docker
timezone: Europe/Moscow
unprivileged: 1
lxc.cgroup2.devices.allow: c 10:200 rwm
lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file
