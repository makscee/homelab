---
# Install on controller: cd ansible && ansible-galaxy collection install -r requirements.yml --upgrade
collections:
  - name: prometheus.prometheus
    version: "0.29.1"   # latest stable as of 2026-04-14 (operator machine has this version installed globally)

  # Phase 12 additions (v3.0 homelab-admin deploy)
  - name: community.general
    version: ">=9.0.0"   # provides blockinfile (Plan 09 Caddyfile patch — D-12-11)
  - name: ansible.posix
    version: ">=1.5.0"   # provides synchronize (Plan 09 rsync) + file ACL helpers

  # HMB-8 — required to decrypt secrets/*.sops.yaml inside playbooks.
  # Without it, Ansible loads SOPS files as raw YAML (envelope as literal string).
  - name: community.sops
    version: ">=2.0.0"
