---
# Deploy voidnet-api + voidnet-bot + voidnet-web (Next.js portal) to mcow
# (VDN-3 Phase 8).
#
# Mirrors the legacy `cargo xtask deploy mcow` chain (cross build → rsync →
# systemctl restart) but wraps it with:
#   - pre-deploy .prev snapshot of the currently-installed binary
#   - post-deploy health probe on the tailnet admin listener
#   - rollback-on-probe-failure that restores .prev + re-restarts
#   - idempotent lineinfile of VOIDNET_TEST_EMAIL_SUPPRESS_SEND into /opt/voidnet/.env
#   - Next.js portal build (bun) + rsync of .next/standalone, .next/static,
#     public → /opt/voidnet-web + voidnet-web.service restart + HTTP probe
#
# The api + portal are ALWAYS deployed together: a new API route without
# the matching UI (or vice-versa) breaks prod. Single ansible invocation
# guarantees atomicity + a shared rollback block.
#
# Defense-in-depth layering (HMB_VDN-1, 2026-04-24):
#   1. First-line defense — GitHub Actions `build-smoke.yml` (voidnet repo)
#      runs on every push to main / feat/** and on every PR to main. It
#      cross-builds voidnet-api + voidnet-bot and executes the
#      `router_smoke` test suite which constructs each factored axum
#      Router and greps for `.route("/:name")` leftovers. Catches the
#      axum 0.7→0.8 route-syntax class of bug BEFORE the playbook ever
#      runs.
#   2. Second-line defense — this playbook's `wait for admin /health`
#      task. The app must boot and serve 200 OK within 15×2=30s of
#      restart. Any startup panic (not caught by CI) fails the probe.
#   3. Third-line defense — the rescue block below. Restores .prev
#      binaries + portal and re-restarts if the health probe times out.
#
# Operators should not rely on (2)/(3) as the primary gate; they are
# survival nets for bugs that slip past (1).
#
# Usage (from hub/workspace/homelab/ansible):
#   ansible-playbook -i inventory/homelab.yml playbooks/deploy-voidnet-api.yml
#
# Preconditions:
#   - controller has cross + cargo (mac or linux; `cross --version` must work)
#   - ssh root@mcow works (Tailnet)
#   - secrets/mcow.sops.yaml contains whatever extra env vars you expect to be
#     in /opt/voidnet/.env — but this playbook does NOT re-render the full .env.
#     Only the single VOIDNET_TEST_EMAIL_SUPPRESS_SEND line is managed here
#     because /opt/voidnet/.env is hand-curated (no SOPS source exists for the
#     full set yet).

- name: Deploy voidnet-api + voidnet-bot + voidnet-web to mcow
  hosts: mcow
  become: true
  gather_facts: false
  vars:
    voidnet_repo_dir: "{{ lookup('env', 'VOIDNET_REPO_DIR')
                        | default('/Users/admin/hub/workspace/voidnet', true) }}"
    voidnet_install_dir: /opt/voidnet
    voidnet_build_target: x86_64-unknown-linux-gnu
    # /health lives on the PUBLIC listener (0.0.0.0:8080) per
    # crates/voidnet-api/src/main.rs route_list. We probe via the tailnet IP
    # so the connection is still tailnet-only from the controller's POV.
    voidnet_health_url: http://100.101.0.9:8080/health
    voidnet_services:
      - voidnet-api
      - voidnet-bot
    # Portal (Next.js standalone) deploy layout.
    voidnet_portal_src_dir: "{{ voidnet_repo_dir }}/apps/portal"
    voidnet_portal_install_dir: /opt/voidnet-web
    voidnet_portal_install_user: voidnet
    voidnet_portal_install_group: voidnet
    voidnet_portal_service: voidnet-web
    # Portal HTTP probe: hits the local node listener directly to decouple
    # from the Caddy edge. 3848 matches voidnet-web.service PORT.
    voidnet_portal_health_url: http://100.101.0.9:3848/
    # Single-line env managed here (see header). Value is sourced from SOPS
    # at task time; when absent the line is left untouched (state=absent
    # would be destructive if operator set the var manually).
    voidnet_env_file: "{{ voidnet_install_dir }}/.env"
    voidnet_test_suppress_sops_file:
      "{{ playbook_dir }}/../../secrets/mcow.sops.yaml"

  handlers:
    - name: reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

  tasks:
    # -----------------------------------------------------------------
    # Phase 1 — cross build on the controller (localhost). Mirrors
    # deploy_mcow_plan() from crates/xtask/src/deploy.rs: cross build
    # --release for three voidnet crates + xtask.
    # -----------------------------------------------------------------
    - name: "controller: cross build voidnet-api + voidnet-bot (release, {{ voidnet_build_target }})"
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        cmd: >
          cross build --release
          --target {{ voidnet_build_target }}
          -p voidnet-api -p voidnet-bot
        chdir: "{{ voidnet_repo_dir }}"
      register: cross_build
      changed_when: true  # always run; cargo caches internally

    - name: "controller: assert compiled binaries exist"
      delegate_to: localhost
      become: false
      ansible.builtin.stat:
        path: "{{ voidnet_repo_dir }}/target/{{ voidnet_build_target }}/release/{{ item }}"
      register: bin_stat
      loop: "{{ voidnet_services }}"
      failed_when: not bin_stat.stat.exists

    # -----------------------------------------------------------------
    # Phase 2 — snapshot currently-live binaries as .prev (rollback anchor).
    # -----------------------------------------------------------------
    - name: "mcow: snapshot existing binaries to .prev (rollback anchor)"
      ansible.builtin.copy:
        src: "{{ voidnet_install_dir }}/{{ item }}"
        dest: "{{ voidnet_install_dir }}/{{ item }}.prev"
        remote_src: true
        mode: "0755"
        owner: root
        group: root
      loop: "{{ voidnet_services }}"
      # First-deploy tolerance: if the service file doesn't exist yet,
      # there's nothing to snapshot; skip rather than fail.
      failed_when:
        - snap.failed is defined
        - snap.failed
        - "'does not exist' not in (snap.msg | default(''))"
      register: snap
      ignore_errors: true

    # -----------------------------------------------------------------
    # Phase 3 — copy new binaries with .new suffix, then atomic mv into place.
    # The rollback block (Phase 5) keys off the .new → real name transition,
    # so failure BEFORE the mv leaves the old binary untouched.
    # -----------------------------------------------------------------
    - name: "mcow: upload new binaries to .new suffix"
      ansible.builtin.copy:
        src: "{{ voidnet_repo_dir }}/target/{{ voidnet_build_target }}/release/{{ item }}"
        dest: "{{ voidnet_install_dir }}/{{ item }}.new"
        mode: "0755"
        owner: root
        group: root
      loop: "{{ voidnet_services }}"

    # -----------------------------------------------------------------
    # Phase 3b — build Next.js portal on the controller (bun) and stage
    # `.next/standalone` + `.next/static` + `public` into a side dir
    # `/opt/voidnet-web.new/` on mcow. Phase 5 atomic-renames it into place.
    # -----------------------------------------------------------------
    - name: "controller: portal bun install (frozen lockfile)"
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        cmd: bun install --frozen-lockfile
        chdir: "{{ voidnet_portal_src_dir }}"
      changed_when: true

    - name: "controller: portal next build (standalone)"
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        cmd: bun run build
        chdir: "{{ voidnet_portal_src_dir }}"
      changed_when: true

    - name: "controller: assert standalone server.js was emitted"
      delegate_to: localhost
      become: false
      ansible.builtin.stat:
        path: "{{ voidnet_portal_src_dir }}/.next/standalone/server.js"
      register: standalone_stat
      failed_when: not standalone_stat.stat.exists

    - name: "mcow: ensure staging dir /opt/voidnet-web.new exists (clean)"
      ansible.builtin.file:
        path: "{{ voidnet_portal_install_dir }}.new"
        state: absent

    - name: "mcow: recreate empty staging dir"
      ansible.builtin.file:
        path: "{{ voidnet_portal_install_dir }}.new"
        state: directory
        owner: "{{ voidnet_portal_install_user }}"
        group: "{{ voidnet_portal_install_group }}"
        mode: "0755"

    - name: "mcow: upload standalone tree (server.js + node_modules + package.json)"
      ansible.posix.synchronize:
        src: "{{ voidnet_portal_src_dir }}/.next/standalone/"
        dest: "{{ voidnet_portal_install_dir }}.new/"
        rsync_opts:
          - "--chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r"
        delete: true

    - name: "mcow: ensure .next dir exists in staging"
      ansible.builtin.file:
        path: "{{ voidnet_portal_install_dir }}.new/.next"
        state: directory
        owner: "{{ voidnet_portal_install_user }}"
        group: "{{ voidnet_portal_install_group }}"
        mode: "0755"

    - name: "mcow: upload .next/static (client bundle + assets)"
      ansible.posix.synchronize:
        src: "{{ voidnet_portal_src_dir }}/.next/static/"
        dest: "{{ voidnet_portal_install_dir }}.new/.next/static/"
        delete: true

    - name: "mcow: upload public/ (static root)"
      ansible.posix.synchronize:
        src: "{{ voidnet_portal_src_dir }}/public/"
        dest: "{{ voidnet_portal_install_dir }}.new/public/"
        delete: true

    - name: "mcow: chown staging dir to voidnet:voidnet"
      ansible.builtin.command:
        cmd: chown -R {{ voidnet_portal_install_user }}:{{ voidnet_portal_install_group }}
             {{ voidnet_portal_install_dir }}.new
      changed_when: true

    # -----------------------------------------------------------------
    # Phase 4 — VOIDNET_TEST_EMAIL_SUPPRESS_SEND management.
    # Decrypt mcow.sops.yaml on controller, extract the value for the key
    # "VOIDNET_TEST_EMAIL_SUPPRESS_SEND" if present, and lineinfile it into
    # /opt/voidnet/.env on mcow.
    # -----------------------------------------------------------------
    - name: "controller: decrypt mcow SOPS for VOIDNET_TEST_EMAIL_SUPPRESS_SEND"
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        # sops --extract on a plain-scalar key prints the unquoted value; no
        # JSON framing. `from_json` would fail, so we consume stdout raw and
        # trim whitespace when emitting the .env line.
        cmd: >
          sops --decrypt --extract
          '["VOIDNET_TEST_EMAIL_SUPPRESS_SEND"]'
          {{ voidnet_test_suppress_sops_file }}
      register: sops_suppress
      changed_when: false
      failed_when: false
      no_log: true

    - name: "mcow: set VOIDNET_TEST_EMAIL_SUPPRESS_SEND in /opt/voidnet/.env"
      ansible.builtin.lineinfile:
        path: "{{ voidnet_env_file }}"
        regexp: '^VOIDNET_TEST_EMAIL_SUPPRESS_SEND='
        line: "VOIDNET_TEST_EMAIL_SUPPRESS_SEND={{ sops_suppress.stdout | trim }}"
        owner: root
        group: root
        mode: "0600"
        backup: true
      when:
        - sops_suppress.rc == 0
        - (sops_suppress.stdout | default('') | trim | length) > 0
      no_log: true

    # -----------------------------------------------------------------
    # Phase 5 — atomic mv + systemd restart inside a block/rescue so any
    # failure from here on triggers rollback to .prev.
    # -----------------------------------------------------------------
    - name: "mcow: atomic swap + restart + health probe (rollback on fail)"
      block:
        - name: "mcow: atomic mv .new → real binary"
          ansible.builtin.command:
            cmd: mv -f "{{ voidnet_install_dir }}/{{ item }}.new"
                 "{{ voidnet_install_dir }}/{{ item }}"
          loop: "{{ voidnet_services }}"
          changed_when: true

        # Portal swap: rename current → .prev, staged → current. Both
        # renames are directory moves, fast and atomic on the same fs.
        - name: "mcow: stat current portal install"
          ansible.builtin.stat:
            path: "{{ voidnet_portal_install_dir }}"
          register: portal_current

        - name: "mcow: drop existing .prev portal (rollback anchor replaced each deploy)"
          ansible.builtin.file:
            path: "{{ voidnet_portal_install_dir }}.prev"
            state: absent

        - name: "mcow: move current portal → .prev (rollback anchor)"
          ansible.builtin.command:
            cmd: mv "{{ voidnet_portal_install_dir }}"
                 "{{ voidnet_portal_install_dir }}.prev"
          when: portal_current.stat.exists
          changed_when: true

        - name: "mcow: move staged portal → install dir"
          ansible.builtin.command:
            cmd: mv "{{ voidnet_portal_install_dir }}.new"
                 "{{ voidnet_portal_install_dir }}"
          changed_when: true

        - name: "mcow: systemd daemon-reload + restart api/bot services"
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: restarted
            daemon_reload: true
          loop: "{{ voidnet_services }}"

        - name: "mcow: wait for admin /health to return 200"
          ansible.builtin.uri:
            url: "{{ voidnet_health_url }}"
            return_content: false
            status_code: 200
          register: health_probe
          until: health_probe.status == 200
          retries: 15
          delay: 2

        - name: "mcow: restart voidnet-web (portal)"
          ansible.builtin.systemd:
            name: "{{ voidnet_portal_service }}"
            state: restarted

        - name: "mcow: wait for portal listener on :3848"
          ansible.builtin.uri:
            url: "{{ voidnet_portal_health_url }}"
            return_content: false
            # 200 on /, 307/308 redirect to /login is also acceptable.
            status_code: [200, 301, 302, 303, 307, 308]
          register: portal_probe
          until: portal_probe.status in [200, 301, 302, 303, 307, 308]
          retries: 20
          delay: 2

        - name: "mcow: verify claude-key route renders (not 404)"
          ansible.builtin.uri:
            url: "http://100.101.0.9:3848/services/claude-key"
            return_content: false
            follow_redirects: none
            # Unauthed → expect redirect to /login (307) or 200 if ssr gate
            # allows. A 404 means the bundle didn't ship this route.
            status_code: [200, 301, 302, 303, 307, 308]
          register: claude_key_probe
          until: claude_key_probe.status in [200, 301, 302, 303, 307, 308]
          retries: 10
          delay: 2

      rescue:
        - name: "ROLLBACK: restore .prev binaries"
          ansible.builtin.copy:
            src: "{{ voidnet_install_dir }}/{{ item }}.prev"
            dest: "{{ voidnet_install_dir }}/{{ item }}"
            remote_src: true
            mode: "0755"
            owner: root
            group: root
          loop: "{{ voidnet_services }}"
          # If .prev doesn't exist (first deploy), we can't roll back;
          # surface the original failure instead.
          ignore_errors: true

        - name: "ROLLBACK: restart services from restored .prev binaries"
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: restarted
            daemon_reload: true
          loop: "{{ voidnet_services }}"
          ignore_errors: true

        - name: "ROLLBACK: stat .prev portal"
          ansible.builtin.stat:
            path: "{{ voidnet_portal_install_dir }}.prev"
          register: portal_prev_rb

        - name: "ROLLBACK: swap portal back from .prev"
          ansible.builtin.shell: |
            set -e
            rm -rf "{{ voidnet_portal_install_dir }}.broken" || true
            if [ -d "{{ voidnet_portal_install_dir }}" ]; then
              mv "{{ voidnet_portal_install_dir }}" "{{ voidnet_portal_install_dir }}.broken"
            fi
            mv "{{ voidnet_portal_install_dir }}.prev" "{{ voidnet_portal_install_dir }}"
          when: portal_prev_rb.stat.exists
          ignore_errors: true

        - name: "ROLLBACK: restart voidnet-web from restored .prev"
          ansible.builtin.systemd:
            name: "{{ voidnet_portal_service }}"
            state: restarted
          ignore_errors: true

        - name: "ROLLBACK: fail the play (deploy did not pass health probe)"
          ansible.builtin.fail:
            msg: >-
              Health probe failed (api {{ voidnet_health_url }} or portal
              {{ voidnet_portal_health_url }}). Binaries + portal rolled
              back to .prev on mcow. Check `journalctl -u voidnet-api -n 100`
              and `journalctl -u voidnet-web -n 100`.
