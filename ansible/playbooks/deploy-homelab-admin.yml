---
# Deploy Next.js admin dashboard to mcow.
# Idempotent: second run from a clean controller yields all-ok (SC #5).
#
# Run:
#   cd ansible
#   ansible-playbook -i inventory/homelab.yml playbooks/deploy-homelab-admin.yml
#
# Prereqs on controller:
#   - sops + age installed (age key at ~/.config/sops/age/keys.txt)
#   - SSH access to root@100.101.0.9 (Tailnet — mcow)
#   - Bun installed (for local `bun audit` gate)
#   - Collections installed: ansible-galaxy collection install -r requirements.yml
#   - docs/setup-github-oauth.md complete + secrets/mcow.sops.yaml has homelab_admin: block (Plan 12-08)

- name: Pre-deploy gate — bun audit on controller
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: Run bun audit (HIGH/CRITICAL aborts deploy)
      ansible.builtin.command:
        cmd: bun audit --audit-level high
        chdir: "{{ playbook_dir }}/../../apps/admin"
      changed_when: false
      register: audit_result

    - name: Show bun audit summary
      ansible.builtin.debug:
        var: audit_result.stdout_lines

- name: Deploy homelab-admin to mcow
  hosts: mcow
  gather_facts: true
  become: true
  vars:
    repo_root: "{{ playbook_dir }}/../.."
    app_src: "{{ repo_root }}/apps/admin/"
    unit_src: "{{ repo_root }}/servers/mcow/homelab-admin.service"
    caddyfile_path: /etc/caddy/Caddyfile
    caddy_block_marker: "homelab-admin"
    homelab_admin_commit_sha: "{{ lookup('pipe', 'git -C ' + repo_root + ' rev-parse --short HEAD') }}"
    # Explicit play-level copies to work around Ansible 2.20 strict task-arg finalization.
    # group_vars/all.yml is the source of truth; these are resolved aliases for play scope.
    _bun_version: "{{ bun_version }}"
    # Plan 13-07 gap closure: sops binary pinned release (bump only with checksum revalidation).
    # Source: https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.checksums.txt
    _sops_version: "3.9.4"
    _sops_linux_amd64_sha256: "5488e32bc471de7982ad895dd054bbab3ab91c417a118426134551e9626e4e85"
    _homelab_admin_service_group: "{{ homelab_admin_service_group | default('homelab-admin') }}"
    _homelab_admin_service_user: "{{ homelab_admin_service_user | default('homelab-admin') }}"
    _homelab_admin_install_dir: "{{ homelab_admin_install_dir | default('/opt/homelab-admin/app') }}"
    _homelab_admin_port: "{{ homelab_admin_port | default(3847) }}"
    _homelab_admin_domain: "{{ homelab_admin_domain | default('homelab.makscee.ru') }}"
    _homelab_admin_env_dir: "{{ homelab_admin_env_dir | default('/etc/homelab-admin') }}"
    _homelab_admin_age_recipients: "{{ homelab_admin_age_recipients | default([]) }}"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart homelab-admin
      ansible.builtin.systemd:
        name: homelab-admin.service
        state: restarted

    - name: Validate Caddyfile
      ansible.builtin.command:
        cmd: caddy validate --config {{ caddyfile_path }} --adapter caddyfile
      changed_when: false
      listen: "Validate and reload Caddy"

    - name: Reload Caddy
      ansible.builtin.systemd:
        name: caddy
        state: reloaded
      listen: "Validate and reload Caddy"

  tasks:

    # ── Stage 1 — Bun runtime ───────────────────────────────────────────────
    - name: Check current Bun version on mcow
      ansible.builtin.command: /usr/local/bin/bun --version
      register: bun_installed
      failed_when: false
      changed_when: false

    # Security note (WR-02 review fix):
    # Previously piped `curl https://bun.sh/install | bash` — supply-chain risk.
    # Now we download the installer to a temp file and verify its integrity via
    # Ansible's checksum facility before executing it. The installer is a
    # *rolling* script (same URL for every version), so its hash WILL change
    # over time; maintainers must refresh `_bun_installer_sha256` whenever the
    # upstream script changes. Accepted tradeoff: still fetches over TLS, but
    # now a MITM/CDN compromise cannot silently swap the script bytes without
    # breaking the checksum gate.
    - name: Download Bun installer to temp file
      ansible.builtin.get_url:
        url: "https://bun.sh/install"
        dest: /tmp/bun-install.sh
        mode: '0700'
        force: true
      when: bun_installed.rc != 0 or _bun_version not in (bun_installed.stdout | default(''))
      register: bun_installer_download

    - name: Verify Bun installer checksum (pinned via {{ _bun_installer_sha256 | default('unset — running unpinned, SEE WR-02') }})
      ansible.builtin.stat:
        path: /tmp/bun-install.sh
        checksum_algorithm: sha256
      register: bun_installer_stat
      when:
        - bun_installer_download is changed
        - _bun_installer_sha256 is defined
        - _bun_installer_sha256 | length > 0
      failed_when:
        - bun_installer_stat.stat.checksum is defined
        - bun_installer_stat.stat.checksum != _bun_installer_sha256

    - name: Install/Upgrade Bun to {{ _bun_version }}
      ansible.builtin.shell: |
        set -euo pipefail
        /tmp/bun-install.sh "bun-v{{ _bun_version }}"
        install -m 0755 /root/.bun/bin/bun /usr/local/bin/bun
      args:
        executable: /bin/bash
      when: bun_installed.rc != 0 or _bun_version not in (bun_installed.stdout | default(''))

    - name: Remove Bun installer temp file
      ansible.builtin.file:
        path: /tmp/bun-install.sh
        state: absent
      when: bun_installed.rc != 0 or _bun_version not in (bun_installed.stdout | default(''))

    # ── Stage 1b — sops + age (Plan 13-07 gap closure) ──────────────────────
    # Runtime decrypt path for /opt/homelab-admin/app/secrets/claude-tokens.sops.yaml.
    - name: Check current sops version on mcow
      ansible.builtin.command: /usr/local/bin/sops --version
      register: sops_installed
      failed_when: false
      changed_when: false

    - name: Download sops {{ _sops_version }} binary
      ansible.builtin.get_url:
        url: "https://github.com/getsops/sops/releases/download/v{{ _sops_version }}/sops-v{{ _sops_version }}.linux.amd64"
        dest: /usr/local/bin/sops
        mode: '0755'
        owner: root
        group: root
        checksum: "sha256:{{ _sops_linux_amd64_sha256 }}"
      when: sops_installed.rc != 0 or _sops_version not in (sops_installed.stdout | default(''))

    - name: Install age via apt (idempotent)
      ansible.builtin.apt:
        name: age
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Verify sops binary reports pinned version
      ansible.builtin.command: /usr/local/bin/sops --version
      changed_when: false
      register: sops_verify
      failed_when: _sops_version not in sops_verify.stdout

    # ── Stage 2 — OS user + group ───────────────────────────────────────────
    - name: Ensure homelab-admin group exists
      ansible.builtin.group:
        name: "{{ _homelab_admin_service_group }}"
        system: true
        state: present

    - name: Ensure homelab-admin user exists
      ansible.builtin.user:
        name: "{{ _homelab_admin_service_user }}"
        group: "{{ _homelab_admin_service_group }}"
        system: true
        shell: /usr/sbin/nologin
        home: /opt/homelab-admin
        create_home: false
        state: present

    # ── Stage 3 — Directories ───────────────────────────────────────────────
    - name: Ensure /opt/homelab-admin exists
      ansible.builtin.file:
        path: /opt/homelab-admin
        state: directory
        owner: "{{ _homelab_admin_service_user }}"
        group: "{{ _homelab_admin_service_group }}"
        mode: '0755'

    - name: Ensure {{ _homelab_admin_install_dir }} exists
      ansible.builtin.file:
        path: "{{ _homelab_admin_install_dir }}"
        state: directory
        owner: "{{ _homelab_admin_service_user }}"
        group: "{{ _homelab_admin_service_group }}"
        mode: '0755'

    # ── Stage 4 — Secrets + env file (delegates to Plan 08 task file) ──────
    - name: Plumb secrets from SOPS to /etc/homelab-admin/env
      ansible.builtin.include_tasks: tasks/homelab-admin-secrets.yml

    # ── Stages 5–7 (legacy: rsync source, bun install on target, build on
    # target) replaced by the nextjs_app_deploy role: build on controller +
    # ship a pre-built standalone bundle + atomic symlink swap + rollback. The
    # role's build/stage/ship/swap/healthcheck phases run AFTER systemd unit
    # install (Stage 8) so the unit file is in place before swap restarts the
    # service. (HMB-14 Task 4)

    # ── Stage 7b — Audit data directory ─────────────────────────────────────
    - name: Provision /var/lib/homelab-admin for audit SQLite DB
      ansible.builtin.include_tasks: tasks/homelab-admin-audit-dir.yml

    # ── Stage 7c — audit.db backup (Phase 22 D-22-14) ───────────────────────
    - name: Ensure /var/backups/homelab-admin exists (root-only)
      ansible.builtin.file:
        path: /var/backups/homelab-admin
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Install audit.db backup script to /usr/local/sbin
      ansible.builtin.copy:
        src: "{{ repo_root }}/scripts/launch/backup-audit-db.sh"
        dest: /usr/local/sbin/backup-audit-db.sh
        owner: root
        group: root
        mode: '0755'

    - name: Install audit.db backup cron (Phase 22 D-22-14)
      ansible.builtin.cron:
        name: "homelab-admin audit.db backup"
        minute: "17"
        hour: "3"
        user: root
        job: "/usr/local/sbin/backup-audit-db.sh >> /var/log/homelab-admin-backup.log 2>&1"
        state: present

    # ── Stage 8 — systemd unit install ──────────────────────────────────────
    - name: Install homelab-admin.service unit
      ansible.builtin.copy:
        src: "{{ unit_src }}"
        dest: /etc/systemd/system/homelab-admin.service
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload systemd
        - Restart homelab-admin

    # Flush handlers so the unit file is in place BEFORE the role's swap
    # phase restarts the service.
    - name: Apply systemd unit changes before role swap
      ansible.builtin.meta: flush_handlers

    - name: Ensure homelab-admin is enabled
      ansible.builtin.systemd:
        name: homelab-admin.service
        enabled: true

    # ── Stage 9 — Build on controller + ship + swap + healthcheck ───────────
    # The nextjs_app_deploy role replaces legacy Stages 5/6/7 (rsync source,
    # bun install on target, build on target). It builds the Next.js
    # standalone bundle on the controller, rsyncs it to a content-addressed
    # release dir on mcow, atomically swaps the `current` symlink, restarts
    # the systemd unit, and runs an internal-IP healthcheck with
    # rescue-style rollback. (HMB-14 Task 4)
    - name: Build, ship, swap, healthcheck via nextjs_app_deploy role
      ansible.builtin.include_role:
        name: nextjs_app_deploy
      vars:
        # 4 levels up from workspace/homelab/ansible/playbooks/ = hub root.
        nextjs_app_yarn_root: "{{ playbook_dir }}/../../../../workspace"
        nextjs_app_admin_dir: "{{ nextjs_app_yarn_root }}/homelab/apps/admin"
        nextjs_app_target_install_dir: /opt/homelab-admin
        nextjs_app_target_user: "{{ _homelab_admin_service_user }}"
        nextjs_app_target_group: "{{ _homelab_admin_service_group }}"
        nextjs_app_systemd_unit: homelab-admin.service
        nextjs_app_healthcheck_url: "http://172.17.0.1:{{ _homelab_admin_port }}/api/health"
        # Next.js standalone output is nested under the workspace-relative
        # path of the app because next.config.mjs sets outputFileTracingRoot
        # to the yarn workspace root (HMB-14 Task 1).
        nextjs_app_standalone_subpath: homelab/apps/admin

    # ── Stage 12 — Caddy block (additive via blockinfile; authors SEC-02 layer) ─
    - name: Render Caddy site-block template locally
      delegate_to: localhost
      become: false
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/caddy-homelab-admin.conf.j2"
        dest: "/tmp/caddy-homelab-admin.conf"
        mode: '0644'
      check_mode: false
      changed_when: false

    - name: Read rendered Caddy block into variable
      delegate_to: localhost
      become: false
      ansible.builtin.slurp:
        src: "/tmp/caddy-homelab-admin.conf"
      register: caddy_block_rendered
      check_mode: false

    - name: Ensure /var/log/caddy exists on mcow
      ansible.builtin.file:
        path: /var/log/caddy
        state: directory
        owner: caddy
        group: caddy
        mode: '0755'

    - name: Patch /etc/caddy/Caddyfile with homelab-admin site block
      ansible.builtin.blockinfile:
        path: "{{ caddyfile_path }}"
        marker: "# {mark} homelab-admin"
        block: "{{ caddy_block_rendered.content | b64decode }}"
        create: false
      notify:
        - Validate and reload Caddy

    - name: Apply Caddy reload before external smoke
      ansible.builtin.meta: flush_handlers

    # ── Stage 14 — External smoke check via Caddy ───────────────────────────
    - name: Smoke — /api/health via https://{{ _homelab_admin_domain }}
      ansible.builtin.uri:
        url: "https://{{ _homelab_admin_domain }}/api/health"
        return_content: true
        status_code: 200
        validate_certs: true
      register: health_public
      retries: 20
      delay: 3
      until: health_public.status == 200 and (health_public.json.ok | default(false))

    - name: Summary
      ansible.builtin.debug:
        msg:
          - "Local  /api/health → {{ health_local.status | default('(check-mode)') }} ok={{ health_local.json.ok | default('(check-mode)') }}"
          - "Public /api/health → {{ health_public.status | default('(check-mode)') }} ok={{ health_public.json.ok | default('(check-mode)') }}"
          - "Commit: {{ homelab_admin_commit_sha }}"
