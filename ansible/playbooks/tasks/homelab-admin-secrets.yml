---
# Decrypt homelab_admin secrets from secrets/mcow.sops.yaml on the Ansible controller
# (localhost), then render /etc/homelab-admin/env on the target host with mode 0600
# owned by homelab-admin:homelab-admin.
#
# Consumers: ansible/playbooks/deploy-homelab-admin.yml (Plan 12-09) includes this via
#   - include_tasks: tasks/homelab-admin-secrets.yml
#
# Preconditions satisfied by caller playbook:
#   - group_vars/all.yml provides: homelab_admin_env_dir, homelab_admin_service_user,
#     homelab_admin_service_group
#   - Target host already has the homelab-admin system user + group created
#   - Controller has sops + age installed, age key at ~/.config/sops/age/keys.txt
#   - Caller provides homelab_admin_commit_sha via --extra-vars or set_fact before include
#
# Security: no_log: true on decrypt; no raw secret values in Ansible stdout/log/facts.

- name: Decrypt homelab_admin secrets locally
  delegate_to: localhost
  become: false
  ansible.builtin.shell:
    cmd: "sops --decrypt --extract '[\"homelab_admin\"]' --output-type json {{ playbook_dir }}/../../secrets/mcow.sops.yaml"
  register: _hla_sops_out
  changed_when: false
  check_mode: false
  no_log: true

- name: Parse decrypted homelab_admin secrets
  become: false
  ansible.builtin.set_fact:
    _hla_secrets: "{{ _hla_sops_out.stdout | from_json }}"
  no_log: true

# Plan 19-01 (PROXMOX-06): decrypt proxmox_dashboard block (token_secret + tower_ca_pem)
- name: Decrypt proxmox_dashboard secrets locally
  delegate_to: localhost
  become: false
  ansible.builtin.shell:
    cmd: "sops --decrypt --extract '[\"proxmox_dashboard\"]' --output-type json {{ playbook_dir }}/../../secrets/mcow.sops.yaml"
  register: _pve_sops_out
  changed_when: false
  check_mode: false
  no_log: true

- name: Parse decrypted proxmox_dashboard secrets
  become: false
  ansible.builtin.set_fact:
    _pve_secrets: "{{ _pve_sops_out.stdout | from_json }}"
  no_log: true

- name: Ensure /etc/homelab-admin env directory exists on target
  ansible.builtin.file:
    path: "{{ _homelab_admin_env_dir }}"
    state: directory
    owner: root
    group: "{{ _homelab_admin_service_group }}"
    mode: '0750'

# Plan 19-01: render tower PVE root CA to disk (mode 0640, service-user readable)
- name: Render tower PVE root CA to /etc/homelab-admin/tower-ca.pem
  ansible.builtin.copy:
    content: "{{ _pve_secrets.tower_ca_pem }}"
    dest: "{{ _homelab_admin_env_dir }}/tower-ca.pem"
    owner: "{{ _homelab_admin_service_user }}"
    group: "{{ _homelab_admin_service_group }}"
    mode: '0640'
  no_log: true
  notify: Restart homelab-admin

- name: Render /etc/homelab-admin/env on target
  ansible.builtin.copy:
    content: |
      # Rendered by Ansible from secrets/mcow.sops.yaml (Plan 12-08). Do NOT hand-edit.
      AUTH_SECRET={{ _hla_secrets.auth_secret }}
      AUTH_URL=https://homelab.makscee.ru
      HOMELAB_ADMIN_GITHUB_OAUTH_CLIENT_ID={{ _hla_secrets.github_oauth_client_id }}
      HOMELAB_ADMIN_GITHUB_OAUTH_CLIENT_SECRET={{ _hla_secrets.github_oauth_client_secret }}
      HOMELAB_ADMIN_ALLOWED_GITHUB_LOGINS={{ _hla_secrets.allowed_github_logins }}
      HOMELAB_ADMIN_COMMIT_SHA={{ homelab_admin_commit_sha | default('unknown') }}
      # Non-secret: Prometheus base URL. docker-tower resolves via Tailnet MagicDNS on mcow.
      # Override in inventory via host_var `prometheus_url` if Prometheus relocates.
      PROMETHEUS_URL={{ prometheus_url | default('http://docker-tower:9090') }}
      # Non-secret: Alertmanager base URL for /alerts link-out (ALERT-02).
      # Override via host_var `alertmanager_url` if AM relocates.
      ALERTMANAGER_URL={{ alertmanager_url | default('http://docker-tower:9093') }}
      # Plan 19-01 (PROXMOX-06): Proxmox read-only API access for /proxmox dashboard.
      # Token scope: VM.Audit + Datastore.Audit only. CA-pinned TLS (no skip-verify).
      PROXMOX_API_BASE=https://tower:8006/api2/json
      PROXMOX_TOKEN_ID=dashboard-operator@pve!readonly
      PROXMOX_TOKEN_SECRET={{ _pve_secrets.token_secret }}
      PROXMOX_CA_PATH={{ _homelab_admin_env_dir }}/tower-ca.pem
    dest: "{{ _homelab_admin_env_dir }}/env"
    owner: "{{ _homelab_admin_service_user }}"
    group: "{{ _homelab_admin_service_group }}"
    mode: '0600'
  no_log: true
  notify: Restart homelab-admin

- name: Drop in-memory secret facts after writing env file
  ansible.builtin.set_fact:
    _hla_secrets: null
    _hla_sops_out: null
    _pve_secrets: null
    _pve_sops_out: null
  no_log: true
