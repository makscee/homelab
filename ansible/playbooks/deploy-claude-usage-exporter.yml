---
# Deploy claude-usage-exporter to mcow.
# Phase 13-02 (SEC-03): Tailnet-only bind, uid 65534 (nobody), mtime-poll
# registry reload every 30s so admin-app SOPS writes surface in metrics
# without a full Ansible redeploy (D-13-07).
#
# Run:
#   cd ansible
#   ansible-playbook -i inventory.ini playbooks/deploy-claude-usage-exporter.yml
#
# Prereqs on controller:
#   - sops + age installed (age key at ~/.config/sops/age/keys.txt)
#   - SSH access to root@100.101.0.9 (Tailnet — mcow)
#   - secrets/claude-tokens.sops.yaml exists and decryptable
#
# Idempotency:
#   - synchronize(delete=true) is a no-op when src==dest
#   - copy uses content-hash for both the unit file and the rendered registry
#   - decrypt task carries changed_when: false (produces no artifact by itself)
#   - handlers only fire when files change

- name: Deploy claude-usage-exporter to mcow
  hosts: mcow
  become: true
  vars_files:
    - "{{ playbook_dir }}/../group_vars/all.yml"
  vars:
    exporter_src: "{{ playbook_dir }}/../../servers/mcow/claude-usage-exporter"
    unit_src: "{{ playbook_dir }}/../../servers/mcow/systemd/claude-usage-exporter.service"
    sops_file: "{{ playbook_dir }}/../../secrets/claude-tokens.sops.yaml"
    # Ansible 2.20 strict task-arg finalization cannot resolve nested dict keys
    # (claude_usage_exporter.state_dir) directly in task args. Alias at play scope.
    _state_dir: "{{ claude_usage_exporter.state_dir }}"
    _install_dir: "{{ claude_usage_exporter.install_dir }}"
    _read_path: "{{ claude_usage_exporter.read_path }}"
    _shared_read_group: "{{ claude_usage_exporter.shared_read_group }}"

  handlers:
    - name: reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: restart claude-usage-exporter
      ansible.builtin.systemd:
        name: claude-usage-exporter
        state: restarted

  tasks:
    # VDN-3 Phase 6: shared read group so voidnet-api can read the decrypted
    # registry without being granted world-read. Exporter keeps writing as
    # nobody; additional readers join `claude-secrets` and the registry file
    # is chgrp'd to that group with 0440 (group read, no world).
    - name: Ensure shared read group exists (claude-secrets)
      ansible.builtin.group:
        name: "{{ _shared_read_group }}"
        state: present
        system: true

    - name: Add voidnet-api user to shared read group (claude-secrets)
      ansible.builtin.user:
        name: "{{ voidnet_api_user }}"
        groups: "{{ _shared_read_group }}"
        append: true
      # Safe when voidnet_api_user == root: adding root to an extra group is a
      # no-op at the authorization level but keeps the play idiom identical.

    - name: Ensure state dir exists (owned by nobody, group-traversable by claude-secrets)
      ansible.builtin.file:
        path: "{{ _state_dir }}"
        state: directory
        owner: nobody
        group: "{{ _shared_read_group }}"
        mode: "0750"

    - name: Ensure install dir exists (root-owned, read-only to nobody)
      ansible.builtin.file:
        path: "{{ _install_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install python3-prometheus-client (system-wide, required by exporter.py)
      ansible.builtin.apt:
        name: python3-prometheus-client
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Remove stale venv from prior install (no longer used — system python)
      ansible.builtin.file:
        path: "{{ _install_dir }}/venv"
        state: absent

    - name: Rsync exporter source to mcow (no owner/perm preservation from mac)
      ansible.posix.synchronize:
        src: "{{ exporter_src }}/"
        dest: "{{ _install_dir }}/"
        delete: true
        owner: false
        group: false
        perms: false
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--exclude=test_exporter.py"
          - "--exclude=.venv"
          - "--exclude=.pytest_cache"
          - "--exclude=.gitignore"
      notify: restart claude-usage-exporter

    - name: Normalize install dir ownership to root:root (rsync preserves mac uid/gid)
      ansible.builtin.command:
        cmd: "chown -R root:root {{ _install_dir }}"
      register: _chown_out
      changed_when: false

    - name: Normalize install dir file modes (files 0644, dirs 0755)
      ansible.builtin.command:
        cmd: "find {{ _install_dir }} -type f -exec chmod 0644 {} + -o -type d -exec chmod 0755 {} +"
      changed_when: false

    - name: Install systemd unit file
      ansible.builtin.copy:
        src: "{{ unit_src }}"
        dest: /etc/systemd/system/claude-usage-exporter.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - reload systemd
        - restart claude-usage-exporter

    - name: Decrypt claude-tokens registry on controller
      delegate_to: localhost
      become: false
      ansible.builtin.command: sops -d --output-type json {{ sops_file }}
      register: decrypted_registry
      changed_when: false
      no_log: true

    - name: Render decrypted registry on mcow (nobody + claude-secrets, 0440)
      ansible.builtin.copy:
        content: "{{ decrypted_registry.stdout }}"
        dest: "{{ _read_path }}"
        owner: nobody
        group: "{{ _shared_read_group }}"
        mode: "0440"
      no_log: true
      # 0440 + group=claude-secrets grants read to voidnet-api (member of
      # claude-secrets via the user task above) without exposing world-read.
      # mtime advance -> exporter reloads within reload_interval seconds.

    - name: Drop decrypted fact from memory
      ansible.builtin.set_fact:
        decrypted_registry: !!null
      no_log: true

    - name: Ensure service enabled and running
      ansible.builtin.systemd:
        name: claude-usage-exporter
        enabled: true
        state: started
        daemon_reload: true
