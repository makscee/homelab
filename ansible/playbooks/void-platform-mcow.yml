---
# HMB-9 — deploy void platform stack (Caddy + void-mail) to mcow.
#
# Spec: docs/superpowers/specs/2026-04-28-phase-1-auth-keys-mail.md § Deployment
#
# Slice 1: void-mail only (lowest blast-radius). HMB-9b adds void-auth, HMB-9c
# adds void-keys. Caddy + compose plumbing is validated once in this slice.
#
# HMB-9c S2/S3 revise (2026-04-29): void-keys-db sidecar dropped — void-keys
# reuses the existing `void-mail-staging-db` postgres container on mcow (the
# single pg process). A dedicated `void_keys` user + `void_keys` database are
# provisioned at deploy time by docker-exec'd psql DO blocks. Pool tokens are
# decrypted at deploy time and rendered to pool_tokens.yaml (plaintext, mode
# 0600). VKE-3d follow-up will fix the void-keys `sops -d` shell-out.
# Pre-req: deploy void-platform-staging-mcow.yml first so the pg container is
# up before this playbook tries to provision the void_keys DB on it.
#
# Secrets: loaded via community.sops.load_vars (NOT vars_files — vars_files
# does not decrypt SOPS, see feedback memory ansible_sops_decrypt and HMB-8).
#
# Pre-deploy operator setup:
#   - sops --encrypt --in-place secrets/void-mail.sops.yaml         (replace placeholders first)
#   - sops --encrypt --in-place secrets/void-auth.sops.yaml         (HMB-9b — replace placeholder first)
#   - sops --encrypt --in-place secrets/void-keys.sops.yaml         (HMB-9c — db password)
#   - sops --encrypt --in-place secrets/void-keys-tokens.sops.yaml  (HMB-9c — Anthropic pool tokens)
#   - sops --encrypt --in-place secrets/ghcr.sops.yaml              (ghcr_username + ghcr_pat)
#
# Deploy:
#   cd ansible
#   ansible-playbook -i inventory/homelab.yml playbooks/void-platform-mcow.yml \
#     [-e ghcr_image_tag=<sha-or-tag>]

- name: "HMB-9 — void platform stack on mcow"
  hosts: void_platform
  become: true
  gather_facts: true

  pre_tasks:
    - name: load SOPS-decrypted void-mail secrets
      community.sops.load_vars:
        file: ../../secrets/void-mail.sops.yaml
      no_log: true

    - name: load SOPS-decrypted void-auth secrets
      community.sops.load_vars:
        file: ../../secrets/void-auth.sops.yaml
      no_log: true

    - name: load SOPS-decrypted void-keys secrets (db user password)
      community.sops.load_vars:
        file: ../../secrets/void-keys.sops.yaml
      no_log: true

    - name: load SOPS-decrypted void-keys pool tokens (deploy-time render)
      community.sops.load_vars:
        file: ../../secrets/void-keys-tokens.sops.yaml
      no_log: true

    - name: load SOPS-decrypted GHCR credentials
      community.sops.load_vars:
        file: ../../secrets/ghcr.sops.yaml
      no_log: true

  tasks:
    - name: stop + disable host deb caddy (one-shot cutover, opt-in via -e migrate_host_caddy=true)
      ansible.builtin.systemd:
        name: caddy
        state: stopped
        enabled: false
      when: migrate_host_caddy | default(false) | bool
      failed_when: false  # idempotent: unit may already be gone on re-runs

    - name: check whether docker is already installed
      ansible.builtin.command: docker --version
      register: docker_version_check
      changed_when: false
      failed_when: false

    - name: install docker engine + compose plugin (only if docker absent)
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
        state: present
        update_cache: true
        cache_valid_time: 3600
      when:
        - ansible_os_family == 'Debian'
        - docker_version_check.rc != 0

    - name: ensure void stack directory exists
      ansible.builtin.file:
        path: "{{ void_stack_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: ensure void-mail subdirectory exists
      ansible.builtin.file:
        path: "{{ void_stack_dir }}/void-mail"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: ensure void-auth subdirectory exists
      ansible.builtin.file:
        path: "{{ void_stack_dir }}/void-auth"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: ensure void-keys subdirectory exists
      ansible.builtin.file:
        path: "{{ void_stack_dir }}/void-keys"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: render Caddyfile
      ansible.builtin.template:
        src: templates/Caddyfile.j2
        dest: "{{ void_stack_dir }}/Caddyfile"
        owner: root
        group: root
        mode: "0644"
      notify: restart-stack

    - name: render compose.yml
      ansible.builtin.template:
        src: templates/compose.yml.j2
        dest: "{{ void_stack_dir }}/compose.yml"
        owner: root
        group: root
        mode: "0644"
      notify: restart-stack

    - name: render void-mail .env from sops vars
      ansible.builtin.template:
        src: templates/void-mail.env.j2
        dest: "{{ void_stack_dir }}/void-mail/.env"
        owner: root
        group: root
        mode: "0600"
      no_log: true
      notify: restart-stack

    - name: render void-auth .env from sops vars
      ansible.builtin.template:
        src: templates/void-auth.env.j2
        dest: "{{ void_stack_dir }}/void-auth/.env"
        owner: root
        group: root
        mode: "0600"
      no_log: true
      notify: restart-stack

    - name: render void-keys .env from sops vars
      ansible.builtin.template:
        src: templates/void-keys.env.j2
        dest: "{{ void_stack_dir }}/void-keys/.env"
        owner: root
        group: root
        mode: "0600"
      no_log: true
      notify: restart-stack

    - name: render void-keys pool_tokens.yaml (plaintext on host, mode 0600;
            decrypted at deploy time via community.sops.load_vars)
      ansible.builtin.copy:
        # `pool_tokens` is a top-level map loaded by load_vars from
        # secrets/void-keys-tokens.sops.yaml. Serialize as YAML for
        # token-store.ts plaintext fallback consumption.
        content: "{{ {'pool_tokens': pool_tokens} | to_nice_yaml(indent=2) }}"
        dest: "{{ void_stack_dir }}/void-keys/pool_tokens.yaml"
        owner: root
        group: root
        mode: "0600"
      no_log: true
      notify: restart-stack

    - name: ensure void-mail-staging-db postgres container is running
            (shared pg for prod void-keys; deploy void-platform-staging-mcow.yml first)
      ansible.builtin.command:
        cmd: docker inspect -f '{% raw %}{{.State.Running}}{% endraw %}' void-staging-void-mail-staging-db-1
      register: void_keys_pg_running
      changed_when: false
      failed_when: void_keys_pg_running.rc != 0 or void_keys_pg_running.stdout.strip() != 'true'

    - name: provision void_keys postgres user (idempotent DO block)
      ansible.builtin.command:
        cmd: >-
          docker exec -i void-staging-void-mail-staging-db-1
          psql -v ON_ERROR_STOP=1 -U void_mail -d postgres -v role={{ void_keys_db_user }}
               -v pw={{ void_keys_db_pass }}
               -c "DO $$ BEGIN
                     IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = :'role') THEN
                       EXECUTE format('CREATE ROLE %I LOGIN PASSWORD %L', :'role', :'pw');
                     ELSE
                       EXECUTE format('ALTER ROLE %I WITH PASSWORD %L', :'role', :'pw');
                     END IF;
                   END $$;"
      changed_when: false
      no_log: true

    - name: provision void_keys database (idempotent)
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          exists=$(docker exec -i void-staging-void-mail-staging-db-1 \
                    psql -tAU void_mail -d postgres \
                    -c "SELECT 1 FROM pg_database WHERE datname = '{{ void_keys_db_name }}'")
          if [ -z "$exists" ]; then
            docker exec -i void-staging-void-mail-staging-db-1 \
              psql -U void_mail -d postgres \
              -c "CREATE DATABASE {{ void_keys_db_name }} OWNER {{ void_keys_db_user }}"
          fi
      register: void_keys_db_create
      changed_when: "'CREATE DATABASE' in (void_keys_db_create.stdout | default(''))"

    - name: log into ghcr.io
      community.docker.docker_login:
        registry_url: ghcr.io
        username: "{{ ghcr_username }}"
        password: "{{ ghcr_pat }}"
        reauthorize: true
      no_log: true

    - name: bring up the void stack (pull + up -d)
      community.docker.docker_compose_v2:
        project_src: "{{ void_stack_dir }}"
        state: present
        pull: always

  handlers:
    - name: restart-stack
      community.docker.docker_compose_v2:
        project_src: "{{ void_stack_dir }}"
        state: restarted
