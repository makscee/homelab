---
# HMB-9 — deploy void platform stack (Caddy + void-mail) to mcow.
#
# Spec: docs/superpowers/specs/2026-04-28-phase-1-auth-keys-mail.md § Deployment
#
# Slice 1: void-mail only (lowest blast-radius). HMB-9b adds void-auth, HMB-9c
# adds void-keys. Caddy + compose plumbing is validated once in this slice.
#
# Secrets: loaded via community.sops.load_vars (NOT vars_files — vars_files
# does not decrypt SOPS, see feedback memory ansible_sops_decrypt and HMB-8).
#
# Pre-deploy operator setup:
#   - sops --encrypt --in-place secrets/void-mail.sops.yaml         (replace placeholders first)
#   - sops --encrypt --in-place secrets/void-auth.sops.yaml         (HMB-9b — replace placeholder first)
#   - sops --encrypt --in-place secrets/void-keys.sops.yaml         (HMB-9c — db password)
#   - sops --encrypt --in-place secrets/void-keys-tokens.sops.yaml  (HMB-9c — Anthropic pool tokens)
#   - sops --encrypt --in-place secrets/ghcr.sops.yaml              (ghcr_username + ghcr_pat)
#
# Deploy:
#   cd ansible
#   ansible-playbook -i inventory/homelab.yml playbooks/void-platform-mcow.yml \
#     [-e ghcr_image_tag=<sha-or-tag>]

- name: "HMB-9 — void platform stack on mcow"
  hosts: void_platform
  become: true
  gather_facts: true

  pre_tasks:
    - name: load SOPS-decrypted void-mail secrets
      community.sops.load_vars:
        file: ../../secrets/void-mail.sops.yaml
      no_log: true

    - name: load SOPS-decrypted void-auth secrets
      community.sops.load_vars:
        file: ../../secrets/void-auth.sops.yaml
      no_log: true

    - name: load SOPS-decrypted void-keys secrets
      community.sops.load_vars:
        file: ../../secrets/void-keys.sops.yaml
      no_log: true

    - name: load SOPS-decrypted void-keys pool tokens
      community.sops.load_vars:
        file: ../../secrets/void-keys-tokens.sops.yaml
      no_log: true

    - name: load SOPS-decrypted GHCR credentials
      community.sops.load_vars:
        file: ../../secrets/ghcr.sops.yaml
      no_log: true

    - name: Load void-fleet secrets
      community.sops.load_vars:
        file: ../../secrets/void-fleet.sops.yaml
      no_log: true

  tasks:
    - name: ensure monitoring docker network exists (HMB-20)
      community.docker.docker_network:
        name: monitoring
        driver: bridge
        state: present

    - name: stop + disable host deb caddy (one-shot cutover, opt-in via -e migrate_host_caddy=true)
      ansible.builtin.systemd:
        name: caddy
        state: stopped
        enabled: false
      when: migrate_host_caddy | default(false) | bool
      failed_when: false  # idempotent: unit may already be gone on re-runs

    - name: check whether docker is already installed
      ansible.builtin.command: docker --version
      register: docker_version_check
      changed_when: false
      failed_when: false

    - name: install docker engine + compose plugin (only if docker absent)
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
        state: present
        update_cache: true
        cache_valid_time: 3600
      when:
        - ansible_os_family == 'Debian'
        - docker_version_check.rc != 0

    - name: ensure void stack directory exists
      ansible.builtin.file:
        path: "{{ void_stack_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: ensure void-mail subdirectory exists
      ansible.builtin.file:
        path: "{{ void_stack_dir }}/void-mail"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: ensure void-auth subdirectory exists
      ansible.builtin.file:
        path: "{{ void_stack_dir }}/void-auth"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: ensure void-keys subdirectory exists
      ansible.builtin.file:
        path: "{{ void_stack_dir }}/void-keys"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: ensure void-admin subdirectory exists
      ansible.builtin.file:
        path: "{{ void_stack_dir }}/void-admin"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create void-fleet directory
      ansible.builtin.file:
        path: "{{ void_stack_dir }}/void-fleet"
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: render Caddyfile
      ansible.builtin.template:
        src: templates/Caddyfile.j2
        dest: "{{ void_stack_dir }}/Caddyfile"
        owner: root
        group: root
        mode: "0644"
      notify: restart-stack

    - name: render compose.yml
      ansible.builtin.template:
        src: templates/compose.yml.j2
        dest: "{{ void_stack_dir }}/compose.yml"
        owner: root
        group: root
        mode: "0644"
      notify: restart-stack

    - name: render void-mail .env from sops vars
      ansible.builtin.template:
        src: templates/void-mail.env.j2
        dest: "{{ void_stack_dir }}/void-mail/.env"
        owner: root
        group: root
        mode: "0600"
      no_log: true
      notify: restart-stack

    - name: render void-auth .env from sops vars
      ansible.builtin.template:
        src: templates/void-auth.env.j2
        dest: "{{ void_stack_dir }}/void-auth/.env"
        owner: root
        group: root
        mode: "0600"
      no_log: true
      notify: restart-stack

    - name: render void-keys .env from sops vars
      ansible.builtin.template:
        src: templates/void-keys.env.j2
        dest: "{{ void_stack_dir }}/void-keys/.env"
        owner: root
        group: root
        mode: "0600"
      no_log: true
      notify: restart-stack

    - name: Render void-fleet .env
      ansible.builtin.template:
        src: templates/void-fleet.env.j2
        dest: "{{ void_stack_dir }}/void-fleet/.env"
        mode: "0600"
      no_log: true
      notify: restart-stack

    - name: Render void-fleet operator SSH key
      ansible.builtin.copy:
        content: "{{ vault_fleet_operator_ssh_privkey }}\n"
        dest: "{{ void_stack_dir }}/void-fleet/operator-ssh-key"
        owner: "100"
        group: "101"
        mode: "0600"
      no_log: true

    - name: Render void-fleet tower CA PEM
      ansible.builtin.copy:
        content: "{{ vault_fleet_proxmox_ca_pem }}"
        dest: "{{ void_stack_dir }}/void-fleet/tower-ca.pem"
        owner: "100"
        group: "101"
        mode: "0644"
      no_log: true

    - name: render void-keys pool-tokens YAML (decrypted at deploy time;
            mounted plaintext into the container — image lacks sops binary,
            so runtime `sops -d` fallback to plaintext read is the live path)
      ansible.builtin.copy:
        content: "{{ {'pool_tokens': pool_tokens} | to_nice_yaml(indent=2) }}"
        dest: "{{ void_stack_dir }}/void-keys/pool_tokens.yaml"
        owner: root
        group: "1000"
        mode: "0640"
      no_log: true
      notify: restart-stack

    - name: log into ghcr.io
      community.docker.docker_login:
        registry_url: ghcr.io
        username: "{{ ghcr_username }}"
        password: "{{ ghcr_pat }}"
        reauthorize: true
      no_log: true

    - name: bring up the void stack (pull + up -d)
      community.docker.docker_compose_v2:
        project_src: "{{ void_stack_dir }}"
        state: present
        pull: always

    - name: Create void_fleet Postgres role
      community.docker.docker_container_exec:
        container: void-keys-db
        command: >
          psql -U void_keys -c "
            DO $$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ void_fleet_db_user }}') THEN
                CREATE ROLE {{ void_fleet_db_user }} WITH LOGIN PASSWORD '{{ vault_fleet_db_pass }}';
              END IF;
            END $$;"
      no_log: true

    - name: Check void_fleet database exists
      community.docker.docker_container_exec:
        container: void-keys-db
        command: psql -U void_keys -tc "SELECT 1 FROM pg_database WHERE datname = '{{ void_fleet_db_name }}'"
      register: fleet_db_check
      changed_when: false

    - name: Create void_fleet database
      community.docker.docker_container_exec:
        container: void-keys-db
        command: psql -U void_keys -c "CREATE DATABASE {{ void_fleet_db_name }} OWNER {{ void_fleet_db_user }}"
      when: "'1' not in fleet_db_check.stdout"

    - name: Grant void_fleet ownership on all tables
      community.docker.docker_container_exec:
        container: void-keys-db
        command: >
          psql -U void_keys -d {{ void_fleet_db_name }} -c "
            DO $$ DECLARE r RECORD;
            BEGIN
              FOR r IN SELECT tablename FROM pg_tables WHERE schemaname = 'public'
              LOOP EXECUTE 'ALTER TABLE public.' || quote_ident(r.tablename) || ' OWNER TO {{ void_fleet_db_user }}';
              END LOOP;
            END $$;
            GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO {{ void_fleet_db_user }};
            GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO {{ void_fleet_db_user }};
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ void_fleet_db_user }};
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ void_fleet_db_user }};"
      changed_when: false

  handlers:
    - name: restart-stack
      community.docker.docker_compose_v2:
        project_src: "{{ void_stack_dir }}"
        state: restarted
