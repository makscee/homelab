---
- name: reload caddy
  # Use restart, not `caddy reload`. Ansible's blockinfile rewrites the file
  # via temp+rename (atomic) which gives Caddyfile a new inode; the bind-mounted
  # caddy container still sees the old inode until it's restarted, so an
  # in-process reload reads stale config.
  ansible.builtin.command: docker restart {{ kuma_caddy_container_name }}
  changed_when: true

- name: wait for caddy to answer after restart
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 443
    delay: 1
    timeout: 30
  listen: reload caddy

- name: restart kuma
  community.docker.docker_compose_v2:
    project_src: "{{ kuma_compose_dir }}"
    state: present
    restarted: true
