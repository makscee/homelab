---
# nether convention: caddy runs in docker, Caddyfile bind-mounted from host.
# *.makscee.ru wildcard site already exists (VDN-53). We inject our handler
# INSIDE that wildcard block (before the catch-all 503 respond) so a host
# matcher routes status.makscee.ru traffic to uptime-kuma. A separate
# `status.makscee.ru { ... }` site block does NOT work here — Caddy's adapter
# silently drops it when the wildcard is also defined alongside the existing
# voidnet/animaya/makscee blocks.

- name: assert caddy phase var is valid
  ansible.builtin.assert:
    that:
      - kuma_caddy_phase in ["private", "public"]
    fail_msg: "kuma_caddy_phase must be 'private' or 'public', got {{ kuma_caddy_phase }}"

- name: render kuma caddy snippet to controller tmp
  delegate_to: localhost
  become: false
  ansible.builtin.template:
    src: "caddy-{{ kuma_caddy_phase }}.j2"
    dest: "/tmp/kuma-caddy-snippet-{{ kuma_caddy_phase }}.conf"
    mode: "0644"
  check_mode: false
  changed_when: false

- name: read rendered snippet into variable
  delegate_to: localhost
  become: false
  ansible.builtin.slurp:
    src: "/tmp/kuma-caddy-snippet-{{ kuma_caddy_phase }}.conf"
  register: kuma_caddy_block
  check_mode: false

- name: inject kuma handler inside *.makscee.ru wildcard block
  ansible.builtin.blockinfile:
    path: "{{ kuma_caddyfile_path }}"
    marker: "  # {mark} uptime-kuma"
    insertbefore: '^\s+respond "voidnet box not configured" 503\s*$'
    block: "{{ kuma_caddy_block.content | b64decode }}"
    create: false
    backup: true
  notify: reload caddy
