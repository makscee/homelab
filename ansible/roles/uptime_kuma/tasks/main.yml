---
- import_tasks: preflight.yml
  tags: [preflight, pre]

- import_tasks: docker.yml
  tags: [pre]

- import_tasks: caddy.yml
  tags: [pre, publish]

- import_tasks: provision.yml
  tags: [pre, provision]

- import_tasks: backup.yml
  tags: [pre]

# Ensure caddy reload (handler) fires BEFORE smoke probes hit the new site.
- name: flush handlers before smoke
  ansible.builtin.meta: flush_handlers
  tags: [pre, publish, smoke]

- import_tasks: smoke.yml
  tags: [smoke, publish]
