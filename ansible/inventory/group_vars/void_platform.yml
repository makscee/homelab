---
# HMB-9 — variables for void platform stack on mcow.
#
# Secrets are NOT loaded here (vars_files does NOT decrypt SOPS — it loads the
# ENC[...] envelope as a literal string; see feedback memory ansible_sops_decrypt
# and HMB-8 root-cause). The playbook (playbooks/void-platform-mcow.yml) loads
# the lone secret (void_mail_smtp_pass) at runtime via:
#     community.sops.load_vars: { file: ../../secrets/void-mail.sops.yaml }

# Caddy
caddy_admin_email: "ops@makscee.ru"
caddy_image: "caddy:2-alpine"

# mcow public IPv4. Caddy ports bind here explicitly so they don't collide
# with tailscaled's specific-IP :443 bind on 100.101.0.9 (Linux refuses
# wildcard bind when a specific-IP bind already holds the port).
mcow_public_ip: "85.209.135.21"

# Compose stack root on the host.
void_stack_dir: "/srv/void"

# GHCR image tag for void-mail. Override per-deploy:
#     ansible-playbook ... -e ghcr_image_tag=<sha-or-tag>
ghcr_image_tag: "latest"

# Image refs.
void_mail_image: "ghcr.io/makscee/void-mail:{{ ghcr_image_tag }}"

# void-mail listens on PORT (default 3000 per repo .env.example). Internal-only.
void_mail_port: 3000

# SMTP relay (Resend) — non-secret defaults; the password lives in SOPS.
void_mail_smtp_host: "smtp.resend.com"
void_mail_smtp_port: 587
void_mail_smtp_user: "resend"
void_mail_smtp_from_name: "void-mail"
void_mail_smtp_from_email: "noreply@voidnet.makscee.ru"

# ---- void-auth (HMB-9b) ----
# Image pinned by SHA for deterministic deploy + easy rollback. void-auth has
# its own tag var (separate from ghcr_image_tag) so each void-* service can be
# rolled independently. Override per-deploy:
#     ansible-playbook ... -e void_auth_image_tag=<sha-or-tag>
void_auth_image_tag: "sha-a40eaed"
void_auth_image: "ghcr.io/makscee/void-auth:{{ void_auth_image_tag }}"

# void-auth listens on PORT (default 3000). Internal-only on the void network;
# Caddy reverse-proxies auth.makscee.ru -> void-auth:3000.
void_auth_port: 3000

# Public URL — used by the device-authorization flow (RFC 8628) to build
# verification_uri / verification_uri_complete returned to CLI clients.
void_auth_public_url: "https://auth.makscee.ru"

# void-mail base URL as seen from inside the compose bridge.
void_auth_mail_base_url: "http://void-mail:{{ void_mail_port }}"

# SQLite DB path inside the container; backed by named volume void-auth-data.
void_auth_database_url: "/data/void-auth.db"

# Dev/staging seed admin email. Empty = no seed (prod default).
void_auth_seed_admin_email: ""

# ---- void-keys (HMB-9c) ----
# Image pinned by SHA for deterministic deploy + easy rollback. Override
# per-deploy: ansible-playbook ... -e void_keys_image_tag=<sha-or-tag>
void_keys_image_tag: "f539e799e3c2b1aa653bb07bb06f195d51045116"
void_keys_image: "ghcr.io/makscee/void-keys:{{ void_keys_image_tag }}"

# void-keys listens on PORT (default 3000 from src/config.ts). Internal-only on
# the void network; Caddy reverse-proxies keys.makscee.ru -> void-keys:3000.
void_keys_port: 3000

# AUTH_BASE_URL — void-auth endpoint void-keys' verifyToken middleware POSTs
# to (`${AUTH_BASE_URL}/verify`). Must include the `/v1/auth` path prefix so
# the resulting URL matches void-auth's registered route `/v1/auth/verify`.
# Reachable inside the compose `void` network by container name; Caddy is not
# in the path. (VAU-4b: discovered missing `/v1/auth` caused 404 on chain.)
void_keys_auth_base_url: "http://void-auth:{{ void_auth_port }}/v1/auth"

# AUTH_ADMIN_BASE_URL — void-auth /v1/admin endpoint void-keys polls for the
# user_id -> displayName map (Prometheus userName label resolution). No app
# auth in v1; the compose `void` network is the trust boundary.
void_keys_auth_admin_base_url: "http://void-auth:{{ void_auth_port }}/v1/admin"
void_keys_user_names_refresh_sec: 300

# Postgres for void-keys (drizzle-orm/postgres-js). HMB-9c provisions a
# dedicated `void-keys-db` postgres:16-alpine sidecar in the same compose
# project (mirrors the void-staging pattern). Connection params come from
# SOPS (secrets/void-keys.sops.yaml) — see void_keys_db_user / db_pass /
# db_name; the URL string is composed in the env.j2 template.
void_keys_db_host: "void-keys-db"
void_keys_db_port: 5432
void_keys_db_name: "void_keys"
void_keys_db_user: "void_keys"

# Path inside the void-keys container where the pool-tokens YAML is mounted.
# Decrypted at deploy time on the host by community.sops.load_vars and
# rendered as plaintext to {{ void_stack_dir }}/void-keys/pool_tokens.yaml,
# then mounted read-only here. token-store.ts shells out `sops -d` first;
# that fails (image lacks the sops binary) and falls back to plaintext read
# of the same path, parsing the `pool_tokens:` map. Avoids shipping the
# encrypted bundle into a container that can't decrypt it.
void_keys_sops_tokens_file: "/secrets/pool_tokens.yaml"

# claude-key-exporter URL (VKE-2 sidecar). Default points at the host metrics
# port — exporter LXC ships in a later HMB-* task. Until then void-keys
# scrape loop logs warnings but the service stays up.
# AES-256-GCM encryption key path inside void-keys container (VKE-5).
# 32-byte binary file mounted read-only from {{ void_stack_dir }}/void-keys/encryption.key.
void_keys_encryption_key_file: "/secrets/encryption.key"

void_keys_exporter_url: "http://100.101.0.9:9101/metrics"

# ── VAD-1 — void-admin panel ─────────────────────────────────────────────
# Admin Next.js panel. Tailnet-only via Caddy ACL (admin.makscee.ru requires
# remote_ip 100.64.0.0/10). No public exposure. Depends on void-auth.
# Image pinned by SHA for deterministic deploy + easy rollback. Override
# per-deploy: ansible-playbook ... -e void_admin_image_tag=<sha-or-tag>
void_admin_image_tag: "sha-e6e0a58"
void_admin_image: "ghcr.io/makscee/void-admin:{{ void_admin_image_tag }}"

# void-admin listens on PORT (default 3000). Internal-only on the void network.
void_admin_port: 3000

# ── VFL-7 — void-fleet step-machine + VM provisioning ────────────────────
# Image tag for void-fleet. Override per-deploy:
#     ansible-playbook ... -e void_fleet_image_tag=<sha-or-tag>
void_fleet_image_tag: "latest"
void_fleet_image: "ghcr.io/makscee/void-fleet:{{ void_fleet_image_tag }}"

# void-fleet listens on PORT (default 3000). Internal-only on the void network.
void_fleet_port: 3000

# Postgres for void-fleet (same pattern as void-keys). Connection params come
# from SOPS (secrets/void-fleet.sops.yaml). The URL string is composed in the
# env.j2 template.
void_fleet_db_host: void-keys-db
void_fleet_db_port: 5432
void_fleet_db_name: void_fleet
void_fleet_db_user: void_fleet

# ── HMB-9d — STAGING void platform stack on mcow ─────────────────────────
# Deployed by playbooks/void-platform-staging-mcow.yml. Separate compose
# project (`void-staging`), separate volumes, separate Caddy vhost
# (auth-staging.makscee.ru). Joins prod's `void` network as external so the
# prod Caddy container can reach staging services by name.
void_staging_compose_dir: "/srv/void-staging"
void_staging_mock_port: 3001
# mcow tailnet IPv4 (matches inventory/homelab.yml hosts.mcow.tailscale_ip).
# Used for binding the void-mail-staging mock port to tailnet only.
mcow_tailnet_ip: "100.101.0.9"

# ── HMB-18 — admin endpoint IP allowlist ─────────────────────────────────
# Caddy gates `/v1/admin/*` on auth.makscee.ru and keys.makscee.ru to this
# list of source IPs/CIDRs. Anything else → 403. Plaintext (IPs not secret).
#
# Operator workflow: `ssh root@mcow` (via tailnet), then run admin curl on
# mcow. Hairpins through Docker NAT → Caddy sees source = mcow's egress IP
# (verified = mcow_public_ip 85.209.135.21). Public-internet access to
# admin paths is blocked.
#
# Rotation: edit this list + re-run `ansible-playbook ... void-platform-mcow.yml`.
# If hairpin source IP ever differs from mcow_public_ip (multi-IP routing),
# add `127.0.0.1/32` and add a loopback bind to the Caddy compose port.
#
# CAVEAT: must contain at least one entry. Empty list renders to
# `not remote_ip ` (no operand) which fails Caddy parse and crash-loops
# the container. To temporarily allow all, set to `["0.0.0.0/0", "::/0"]`
# (NOT recommended — defeats the gate). To temporarily block all, leave
# the entry but pick an IP no one will hit, e.g. `0.0.0.0/32`.
void_admin_ip_allowlist:
  - "85.209.135.21/32"
