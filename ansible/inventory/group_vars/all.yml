---
node_exporter_version: "1.11.1"   # bumped 2026-04-17 (Plan 14-01) — latest stable
node_exporter_web_listen_address: "{{ tailscale_ip }}:9100"
# Bind to Tailscale IP only (SEC-03 / T-14-01-01) — explicit Tailnet-only bind.
# tailscale_ip is set per-host in inventory/homelab.yml.
# If per-host override is needed, add to host_vars/<host>.yml

cadvisor_version: "v0.55.1"   # matches running container; v0.56.1 pin from Plan 14-01 was never released to gcr (404). Upgrade attempt deferred.

# ── v3.0 Phase 12 — homelab-admin dashboard on mcow ─────────────────────
# Port 3847 chosen because Docker (Grafana stack) already owns 3000 on mcow.
# App binds 172.17.0.1:3847 (docker bridge gateway, host-only) — compose-Caddy
# reverse-proxies via host.docker.internal:3847 from homelab.makscee.ru (HMB-9).
homelab_admin_port: 3847
homelab_admin_domain: "homelab.makscee.ru"
homelab_admin_install_dir: "/opt/homelab-admin/app"
homelab_admin_env_dir: "/etc/homelab-admin"
homelab_admin_service_user: "homelab-admin"
homelab_admin_service_group: "homelab-admin"

# Bun runtime — pinned. Installed to /usr/local/bin/bun by Ansible task in Plan 09.
# NOTE: bump this deliberately only when testing a newer Bun on mcow confirms
# no native-module regressions (PITFALLS P-05). Latest stable at plan authoring: 1.1.38.
bun_version: "1.1.38"

# ── v3.0 Phase 13 — claude-usage-exporter hardening (SEC-03) ──────────────
# Tailnet-only bind (was 0.0.0.0), dropped privileges to uid 65534 (nobody),
# mtime-polled registry reload every 30s so admin-app SOPS writes surface in
# metrics without a full Ansible redeploy.
claude_usage_exporter:
  bind_address: 100.101.0.9
  port: 9101
  user: nobody
  group: nogroup
  read_path: /var/lib/claude-usage-exporter/claude-tokens.json
  state_dir: /var/lib/claude-usage-exporter
  install_dir: /opt/claude-usage-exporter
  poll_interval: 300
  reload_interval: 30
  # Shared group used to grant additional readers (e.g. voidnet-api) access
  # to the decrypted registry file without broadening world perms.
  # See VDN-3 Phase 6 (claude-key pool) — voidnet-api hot-reads the registry
  # for per-user token assignment decisions.
  shared_read_group: claude-secrets

# voidnet-api runs as root today (see servers/mcow/voidnet-api.service). The
# variable is exposed so that, if/when the service is hardened to a dedicated
# unprivileged user, only this single var needs to change and the
# `claude-secrets` group membership task stays correct.
voidnet_api_user: root

# ── v3.0 Phase 13 gap closure (Plan 13-06) — SOPS age recipients for re-encrypt
# Used by homelab-admin.service runtime when sops -e re-writes
# secrets/claude-tokens.sops.yaml after a mutation. Order matters only for
# human grep — sops treats the set as unordered.
homelab_admin_age_recipients:
  - age154sy5cc0masul6t7zyza76qw48dqcm700t43pvnwclcswl4leuvs5qrcjp  # operator workstation
  - age12hpz529aeuwq0nlqh5ccxe055ghqtzd36t7d548u36er57kx6p0qg4q5pv  # mcow runtime (Plan 13-06)

# ── HMB-8: off-host restic backup mcow → nether ───────────────────────────
# Public key of the dedicated `restic-mcow` keypair. Private half lives in
# secrets/mcow.sops.yaml under restic_ssh_private_key. nether's root
# authorized_keys gets this entry with restrict + command="internal-sftp".
restic_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOX1ZJrU8PlbCe5Jo2GyaWj2pAaHsKbxVHZ5vcF6fnPA restic-mcow@2026-04-28"

# Backup target paths on mcow. Glob expansion happens inside `sh -c`
# in the systemd unit (systemd does not glob).
restic_backup_paths:
  - /var/lib/docker/volumes/void-*

# Patterns excluded from backup (passed to restic --exclude).
restic_exclude_patterns:
  - "*.bak"

# Repo location on nether (root-owned, mode 0700).
restic_repo_path: /var/backups/restic/mcow

# Repo URL the mcow client uses. user@host=root@nether; path matches above.
restic_repo_url: "sftp:root@nether:/var/backups/restic/mcow"
