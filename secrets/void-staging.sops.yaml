# HMB-9d — STAGING void-platform secrets (UNENCRYPTED placeholder).
#
# Operator MUST fill values + sops-encrypt before running
# playbooks/void-platform-staging-mcow.yml. Mirrors HMB-9b shipping pattern
# (see secrets/void-mail.sops.yaml history).
#
# Encrypt:
#   sops --encrypt --in-place secrets/void-staging.sops.yaml
#
# Loaded at deploy time via community.sops.load_vars (NOT vars_files — see
# feedback memory ansible_sops_decrypt and HMB-8 root-cause).

# Bearer token void-auth presents on calls to void-mail. Empty in staging
# because staging void-mail runs MOCK_MODE=1 and does not enforce auth in v1
# (compose network is the trust boundary). Left here so the SOPS schema is
# stable if/when MAIL_TOKEN enforcement lands.
void_staging_auth_mail_token: ""

# Email seeded as the lone admin row on first boot of void-auth-staging
# (services/seed.ts). Used by the HMB-9b S8 Playwright spec to drive the OTP
# login flow against staging.
void_staging_seed_admin_email: "ops@makscee.ru"
