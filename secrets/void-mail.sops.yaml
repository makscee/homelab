# HMB-9 — SOPS secrets for void-mail service on mcow.
#
# This file is checked in UNENCRYPTED with placeholder values so the structure
# is reviewable. Before first deploy, the operator MUST encrypt in place:
#
#     sops --encrypt --in-place secrets/void-mail.sops.yaml
#
# The catch-all rule in /.sops.yaml (path_regex: secrets/.*\.sops\.yaml$)
# applies the operator + mcow-runtime age recipients automatically.
#
# Loaded at deploy time by playbooks/void-platform-mcow.yml via:
#     community.sops.load_vars: { file: ../../secrets/void-mail.sops.yaml }
# (NEVER vars_files — that loads the ENC[...] envelope as a literal string;
#  see knowledge/lessons / feedback memory ansible_sops_decrypt.)
---
void_mail_postmark_token: REPLACE_BEFORE_DEPLOY
void_mail_from_address: REPLACE_BEFORE_DEPLOY
void_mail_smtp_relay_user: REPLACE_BEFORE_DEPLOY
void_mail_smtp_relay_pass: REPLACE_BEFORE_DEPLOY
