# HMB-9 — SOPS secrets for void-mail service on mcow.
#
# Slice-1 contract: only the SMTP relay password is a secret. All other void-mail
# settings (host, port, user, from-name, from-email, listen port) are non-secret
# defaults living in inventory/group_vars/void_platform.yml.
#
# This file is checked in UNENCRYPTED with a placeholder so the structure is
# reviewable. Before first deploy, the operator MUST replace the placeholder
# with the real Resend API key (currently in mcow:/opt/voidnet/.env as
# SMTP_PASSWORD) and encrypt in place:
#
#     sops --encrypt --in-place secrets/void-mail.sops.yaml
#
# The catch-all rule in /.sops.yaml (path_regex: secrets/.*\.sops\.yaml$)
# applies the operator + mcow-runtime age recipients automatically.
#
# Loaded at deploy time by playbooks/void-platform-mcow.yml via:
#     community.sops.load_vars: { file: ../../secrets/void-mail.sops.yaml }
# (NEVER vars_files — that loads the ENC[...] envelope as a literal string;
#  see knowledge/lessons / feedback memory ansible_sops_decrypt.)
---
void_mail_smtp_pass: REPLACE_BEFORE_DEPLOY
